name: Dev Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dev-release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch tags
        shell: pwsh
        run: |
          git fetch --tags --force

      - name: Compute next dev version
        id: bump
        shell: pwsh
        run: |
          python .github/scripts/bump_dev_version.py --github-output "$env:GITHUB_OUTPUT"

      - name: Capture previous dev tag
        id: relctx
        shell: pwsh
        run: |
          $prevTag = git tag --list "v*-dev" --sort=-v:refname | Select-Object -First 1
          if (-not $prevTag) {
            $prevTag = ""
          }
          "previous_tag=$prevTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Check tag does not already exist
        shell: pwsh
        run: |
          git fetch --tags --force
          $tag = "${{ steps.bump.outputs.tag }}"
          $existing = git ls-remote --tags origin "refs/tags/$tag"
          if ($existing) {
            throw "Tag $tag already exists on origin."
          }
          Write-Output "Tag $tag is new."

      - name: Commit bump and create tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml webui/index.html
          if (git diff --cached --quiet) {
            throw "No version changes detected in pyproject.toml/webui/index.html."
          }
          git commit -m "chore(release): dev ${{ steps.bump.outputs.ui_version }} [skip ci]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:dev
          git push origin "refs/tags/${{ steps.bump.outputs.tag }}"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean upload.spec

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $assetName = "gude-upload-${{ steps.bump.outputs.ui_version }}-windows-x64.exe"
          Copy-Item -Path "dist/gude-upload.exe" -Destination $assetName -Force
          "name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Generate detailed release notes
        shell: pwsh
        run: |
          $tag = "${{ steps.bump.outputs.tag }}"
          $uiVersion = "${{ steps.bump.outputs.ui_version }}"
          $previousTag = "${{ steps.relctx.outputs.previous_tag }}"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $generatedAt = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss zzz")

          if ($previousTag) {
            $range = "$previousTag..HEAD"
            $rangeLabel = "$previousTag..$tag"
            $compareUrl = "${{ github.server_url }}/${{ github.repository }}/compare/$previousTag...$tag"
            $summaryLine = "Changes since $previousTag."
          } else {
            $range = "HEAD"
            $rangeLabel = "HEAD"
            $compareUrl = ""
            $summaryLine = "First dev pre-release generated from current dev branch state."
          }

          $commitCount = [int](git rev-list --count $range)
          $commitLines = @(git log --no-merges --pretty=format:'- %h %s (%an, %ad)' --date=short $range)
          if ($commitLines.Count -eq 0) {
            $commitLines = @("- No non-merge commits in this range.")
          }

          $changedFiles = @(git diff --name-only $range)
          if ($changedFiles.Count -eq 0) {
            $changedFiles = @("None")
          }
          $fileLines = @()
          foreach ($file in $changedFiles) {
            $fileLines += "- $file"
          }

          $lines = @(
            "## Dev Pre-release $tag",
            "",
            "- Version: **$uiVersion**",
            "- Generated: **$generatedAt**",
            "- Commit range: **$rangeLabel**",
            "- Workflow run: $runUrl",
            ""
          )

          if ($compareUrl) {
            $lines += "- Compare: $compareUrl"
            $lines += ""
          }

          $lines += "### Summary"
          $lines += "- $summaryLine"
          $lines += "- Non-merge commits: **$commitCount**"
          $lines += ""
          $lines += "### Included Commits"
          $lines += $commitLines
          $lines += ""
          $lines += "### Changed Files"
          $lines += $fileLines
          $lines += ""
          $lines += "### Artifact"
          $lines += "- ${{ steps.asset.outputs.name }}"

          $lines | Set-Content -Path "release-notes.md" -Encoding utf8

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: gude-upload-${{ steps.bump.outputs.ui_version }}
          target_commitish: dev
          prerelease: true
          generate_release_notes: false
          body_path: release-notes.md
          files: ${{ steps.asset.outputs.name }}
