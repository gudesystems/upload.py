name: Dev Release

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dev-release
  cancel-in-progress: false

jobs:
  build-and-release:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch tags
        shell: pwsh
        run: |
          git fetch --tags --force

      - name: Compute next dev version
        id: bump
        shell: pwsh
        run: |
          python .github/scripts/bump_dev_version.py --github-output "$env:GITHUB_OUTPUT"

      - name: Check tag does not already exist
        shell: pwsh
        run: |
          git fetch --tags --force
          $tag = "${{ steps.bump.outputs.tag }}"
          $existing = git ls-remote --tags origin "refs/tags/$tag"
          if ($existing) {
            throw "Tag $tag already exists on origin."
          }
          Write-Output "Tag $tag is new."

      - name: Commit bump and create tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml webui/index.html
          if (git diff --cached --quiet) {
            throw "No version changes detected in pyproject.toml/webui/index.html."
          }
          git commit -m "chore(release): dev ${{ steps.bump.outputs.ui_version }} [skip ci]"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:dev
          git push origin "refs/tags/${{ steps.bump.outputs.tag }}"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean upload.spec

      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $assetName = "gude-upload-${{ steps.bump.outputs.ui_version }}-windows-x64.exe"
          Copy-Item -Path "dist/gude-upload.exe" -Destination $assetName -Force
          "name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          target_commitish: dev
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.asset.outputs.name }}
