  <script>
    // Fallback wiring for theme dropdown (mirrors template behavior)
    (function () {
      function applyTheme(mode) {
        localStorage.setItem('theme', mode);
        var html = document.documentElement;
        if (mode === 'auto') {
          var mql = window.matchMedia('(prefers-color-scheme: dark)');
          html.setAttribute('data-bs-theme', mql.matches ? 'dark' : 'light');
        } else {
          html.setAttribute('data-bs-theme', mode);
        }
        // Toggle active state in dropdown
        document.querySelectorAll('[data-theme-control="theme"]').forEach(function (btn) {
          btn.classList.toggle('active', btn.value === mode);
        });
        // Toggle dropdown icon
        ['light', 'dark', 'auto'].forEach(function (k) {
          var el = document.querySelector('[data-theme-dropdown-toggle-icon="' + k + '"]');
          if (el) { el.classList.toggle('d-none', k !== mode); }
        });
      }
      document.querySelectorAll('[data-theme-control="theme"]').forEach(function (btn) {
        btn.addEventListener('click', function () { applyTheme(btn.value); });
      });
      // Initialize from store
      applyTheme(localStorage.getItem('theme') || 'light');
    })();
    let table;
    const selectedKeys = new Set();
    const firmwareText = (r) => {
      const parts = [];
      if (r.initial_firmware) {
        const initialLabel = r.status_only ? 'current' : 'previous';
        parts.push(`${r.initial_firmware} (${initialLabel})`);
      }
      if (r.final_firmware && r.final_firmware !== r.initial_firmware) {
        parts.push(`${r.final_firmware} (current)`);
      } else if (r.latest_known_firmware) {
        const date = (r.latest_publish_date && String(r.latest_publish_date).trim()) ? ` ${r.latest_publish_date}` : '';
        parts.push(`${r.latest_known_firmware} (latest${date ? ' ' + r.latest_publish_date : ''})`);
      }
      return parts.join(', ');
    };

    function rowKey(r) {
      if (r.conn_host && r.conn_port) return `${r.conn_host}:${r.conn_port}`;
      return r.ip || '';
    }

    function render(results) {
      const rows = results.map(r => {
        const key = rowKey(r);
        const checked = selectedKeys.has(key) ? 'checked' : '';
        const checkbox = `<input type="checkbox" class="row-select" data-key="${key}" ${checked} />`;
        return [
          checkbox,
          r.success ? '✓' : '✗',
          r.url ? `<a href="${r.url}" target="_blank" rel="noopener">${r.conn_host}:${r.conn_port}</a>` : (r.ip || ''),
          r.product_name || '',
          (r.mac || '').replace(/_/g, ':'),
          firmwareText(r),
          r.firmware_status || r.firmware_upload_notes || '',
          r.error_message || ''
        ];
      });
      if (!table) {
        table = new $.fn.dataTable.Api($('#devicesTable').DataTable({
          data: rows,
          columns: [
            { title: '<div class="form-check mb-0"><input class="form-check-input" id="selectAllHead" type="checkbox" aria-label="Select all" /></div>', orderable: false, searchable: false, className: 'text-center', width: '1%' },
            { title: 'Status' },
            { title: 'IP' },
            { title: 'Product' },
            { title: 'MAC' },
            { title: 'Firmware' },
            { title: 'Notes' },
            { title: 'Error' }
          ],
          pageLength: 10,
          // Layout: Top-left filter; bottom info (left), length (center), pagination (right)
          dom: "<'row dt-top'<'col-sm-12 col-md-6'f><'col-sm-12 col-md-6 text-end dt-top-actions'>>" +
            "t" +
            "<'row dt-bottom'<'col-sm-12 col-md-4'i><'col-sm-12 col-md-4 text-center'l><'col-sm-12 col-md-4'p>>"
        }));
        // Helpers to work with selection across all filtered rows
        function filteredKeys() {
          const keys = [];
          if (!table) return keys;
          table.rows({ search: 'applied' }).every(function () {
            const row = this.data(); // array of cells
            const html = row && row[0] ? String(row[0]) : '';
            const m = html.match(/data-key=\"([^\"]*)\"/);
            if (m) keys.push(m[1]);
          });
          return keys;
        }
        function syncVisibleCheckboxes() {
          $('#devicesTable tbody input.row-select').each(function () {
            const key = this.getAttribute('data-key') || '';
            this.checked = selectedKeys.has(key);
          });
        }
        function updateHeaderSelectAllState() {
          const header = document.getElementById('selectAll');
          if (!header || !table) return;
          const keys = filteredKeys();
          const total = keys.length;
          let selected = 0;
          for (const k of keys) { if (selectedKeys.has(k)) selected++; }
          header.indeterminate = selected > 0 && selected < total;
          header.checked = total > 0 && selected === total;
        }
        // Header select-all operates on all filtered rows (not just current page)
        $('#devicesTable').on('change', '#selectAll, #selectAllHead', function () {
          const checked = this.checked;
          const keys = filteredKeys();
          keys.forEach(k => { if (checked) selectedKeys.add(k); else selectedKeys.delete(k); });
          syncVisibleCheckboxes();
          updateHeaderSelectAllState();
        });
        // Row checkbox change handling (preserve selection across pages)
        $('#devicesTable').on('change', 'tbody input.row-select', function () {
          const key = this.getAttribute('data-key') || '';
          if (this.checked) selectedKeys.add(key); else selectedKeys.delete(key);
          updateHeaderSelectAllState();
        });
        // Keep checkboxes in sync on table redraws (paging, sorting, filtering)
        $('#devicesTable').on('draw.dt', function () {
          syncVisibleCheckboxes();
          updateHeaderSelectAllState();
        });
        // Inject action buttons into top-right area (fallback to filter if needed)
        (function ensureToolbarButtons() {
          if (document.getElementById('refreshBtn')) return; // already added
          var container = document.querySelector('#devicesTable_wrapper .dt-top-actions') ||
            document.querySelector('#devicesTable_wrapper .dataTables_filter');
          if (!container) return;
          // Find Devices button (leftmost)
          var searchBtn = document.createElement('button');
          searchBtn.id = 'findBtn';
          searchBtn.type = 'button';
          searchBtn.className = 'btn fs-10 btn-outline-secondary fw-bold dt-toolbar-btn';
          searchBtn.setAttribute('data-bs-toggle', 'tooltip');
          searchBtn.setAttribute('data-bs-placement', 'bottom');
          searchBtn.setAttribute('data-bs-original-title', 'Find Devices');
          searchBtn.innerHTML = '<svg class="fas svg-h-8 me-2" aria-hidden="true" focusable="false" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="currentColor" d="M505 442.7L405.3 343c28.4-34.9 45.7-79.5 45.7-128C451 96.5 354.5 0 231 0S11 96.5 11 215s96.5 215 220 215c48.5 0 93.1-17.3 128-45.7L442.7 505c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.5-9.4 9.5-24.6.1-33.9zM231 367c-83.7 0-152-68.3-152-152S147.3 63 231 63s152 68.3 152 152-68.3 152-152 152z"></path></svg>Find Devices';

          // Refresh button (formerly GBL Query)
          var runBtn = document.createElement('button');
          runBtn.id = 'refreshBtn';
          runBtn.type = 'button';
          runBtn.className = 'btn fs-10 btn-outline-secondary fw-bold dt-toolbar-btn';
          runBtn.setAttribute('data-bs-toggle', 'tooltip');
          runBtn.setAttribute('data-bs-placement', 'bottom');
          runBtn.setAttribute('data-bs-original-title', 'Refresh');
          runBtn.innerHTML = '<svg class="fas svg-h-8 me-2" aria-hidden="true" focusable="false" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="currentColor" d="M370.72 133.28C339.458 104.008 298.888 87.962 255.848 88c-77.458.068-144.328 53.178-162.791 126.85-1.344 5.363-6.122 9.15-11.651 9.15H24.103c-7.498 0-13.194-6.807-11.807-14.176C33.933 94.924 134.813 8 256 8c66.448 0 126.791 26.136 171.315 68.685L463.03 40.97C478.149 25.851 504 36.559 504 57.941V192c0 13.255-10.745 24-24 24H345.941c-21.382 0-32.09-25.851-16.971-40.971l41.75-41.749zM32 296h134.059c21.382 0 32.09 25.851 16.971 40.971l-41.75 41.75c31.262 29.273 71.835 45.319 114.876 45.28 77.418-.07 144.315-53.144 162.787-126.849 1.344-5.363 6.122-9.15 11.651-9.15h57.304c7.498 0 13.194 6.807 11.807 14.176C478.067 417.076 377.187 504 256 504c-66.448 0-126.791-26.136-171.315-68.685L48.97 471.03C33.851 486.149 8 475.441 8 454.059V320c0-13.255 10.745-24 24-24z"></path></svg>Refresh';
          var updBtn = document.createElement('button');
          updBtn.id = 'updateBtn';
          updBtn.type = 'button';
          updBtn.className = 'btn fs-10 btn-outline-secondary fw-bold dt-toolbar-btn';
          updBtn.setAttribute('data-bs-toggle', 'tooltip');
          updBtn.setAttribute('data-bs-placement', 'bottom');
          updBtn.setAttribute('data-bs-original-title', 'Update');
          updBtn.innerHTML = '<svg class="fas svg-h-8 me-2" aria-hidden="true" focusable="false" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path fill="currentColor" d="M255.545 8c-66.269.119-126.438 26.233-170.86 68.685L48.971 40.971C33.851 25.851 8 36.559 8 57.941V192c0 13.255 10.745 24 24 24h134.059c21.382 0 32.09-25.851 16.971-40.971l-41.75-41.75c30.864-28.899 70.801-44.907 113.23-45.273 92.398-.798 170.283 73.977 169.484 169.442C423.236 348.009 349.816 424 256 424c-41.127 0-79.997-14.678-110.63-41.556-4.743-4.161-11.906-3.908-16.368.553L89.34 422.659c-4.872 4.872-4.631 12.815.482 17.433C133.798 479.813 192.074 504 256 504c136.966 0 247.999-111.033 248-247.998C504.001 119.193 392.354 7.755 255.545 8z"></path></svg>Update';
          container.appendChild(searchBtn);
          container.appendChild(runBtn);
          container.appendChild(updBtn);
          // Wire events (functions can be defined elsewhere)
          searchBtn.addEventListener('click', runFind);
          runBtn.addEventListener('click', runRefresh);
          updBtn.addEventListener('click', runUpdate);
        })();
      } else {
        table.clear();
        table.rows.add(rows);
        table.draw(false);
      }
    }

    async function fetchDevices() {
      const res = await fetch('/api/devices');
      const data = await res.json();
      render(data.results || []);
      return data.running;
    }

    async function runFind() {
      try {
        const btn = document.getElementById('findBtn');
        if (btn) btn.disabled = true;
        await fetch('/api/run');
        let running = true;
        while (running) {
          running = await fetchDevices();
          await new Promise(r => setTimeout(r, 1500));
        }
      } catch (e) {
        console.error(e);
      } finally {
        const btn = document.getElementById('findBtn');
        if (btn) btn.disabled = false;
      }
    }

    async function runRefresh() {
      try {
        const btn = document.getElementById('refreshBtn');
        if (btn) btn.disabled = true;

        const hosts = Array.from(selectedKeys);
        if (hosts.length > 0) {
          // Run status check for selected devices
          await fetch('/api/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ hosts })
          });
        } else {
          // Run global GBL search
          await fetch('/api/run');
        }

        let running = true;
        while (running) {
          running = await fetchDevices();
          await new Promise(r => setTimeout(r, 1500));
        }
      } catch (e) {
        console.error(e);
      } finally {
        const btn = document.getElementById('refreshBtn');
        if (btn) btn.disabled = false;
      }
    }

    async function runUpdate() {
      try {
        const btn = document.getElementById('updateBtn');
        if (!btn) return;
        const hosts = Array.from(selectedKeys);
        if (hosts.length === 0) {
          alert('Please select at least one device.');
          return;
        }
        btn.disabled = true;
        await fetch('/api/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hosts })
        });
        let running = true;
        while (running) {
          running = await fetchDevices();
          await new Promise(r => setTimeout(r, 1500));
        }
      } catch (e) {
        console.error(e);
        alert('Update request failed. See console for details.');
      } finally {
        const btn = document.getElementById('updateBtn');
        if (btn) btn.disabled = false;
      }
    }

    // Buttons are injected next to the search input when the table initializes
    fetchDevices();

    // Vertical menu collapse/open with animation + persistence
    (function () {
      var btn = document.querySelector('.navbar-vertical-toggle');
      if (btn) {
        btn.addEventListener('click', function () {
          var html = document.documentElement;
          var collapsed = html.classList.toggle('navbar-vertical-collapsed');
          localStorage.setItem('isNavbarVerticalCollapsed', collapsed);
        });
      }
    })();
  </script>
