  <script src="/assets/simplebar.min.js"></script>
  <script src="/assets/jquery.min.js"></script>
  <script src="/assets/popper.min.js"></script>

  <script src="/assets/jquery.dataTables.min.js"></script>
  <script src="/assets/dataTables.bootstrap5.min.js"></script>
  <script>
    // Fallback wiring for theme dropdown (mirrors template behavior)
    (function(){
      function applyTheme(mode){
        localStorage.setItem('theme', mode);
        var html = document.documentElement;
        if(mode === 'auto'){
          var mql = window.matchMedia('(prefers-color-scheme: dark)');
          html.setAttribute('data-bs-theme', mql.matches ? 'dark' : 'light');
        } else {
          html.setAttribute('data-bs-theme', mode);
        }
        // Toggle active state in dropdown
        document.querySelectorAll('[data-theme-control="theme"]').forEach(function(btn){
          btn.classList.toggle('active', btn.value === mode);
        });
        // Toggle dropdown icon
        ['light','dark','auto'].forEach(function(k){
          var el = document.querySelector('[data-theme-dropdown-toggle-icon="'+k+'"]');
          if(el){ el.classList.toggle('d-none', k !== mode); }
        });
      }
      document.querySelectorAll('[data-theme-control="theme"]').forEach(function(btn){
        btn.addEventListener('click', function(){ applyTheme(btn.value); });
      });
      // Initialize from store
      applyTheme(localStorage.getItem('theme') || 'light');
    })();
    let table;
    const firmwareText = (r) => {
      const parts = [];
      if (r.initial_firmware) parts.push(`${r.initial_firmware} (previous)`);
      if (r.final_firmware && r.final_firmware !== r.initial_firmware) {
        parts.push(`${r.final_firmware} (current)`);
      } else if (r.latest_known_firmware) {
        parts.push(`${r.latest_known_firmware} (latest)`);
      }
      return parts.join(', ');
    };

    function render(results) {
      const rows = results.map(r => ([
        r.success ? '✓' : '✗',
        r.url ? `<a href="${r.url}" target="_blank" rel="noopener">${r.conn_host}:${r.conn_port}</a>` : (r.ip || ''),
        r.product_name || '',
        (r.mac || '').replace(/_/g, ':'),
        firmwareText(r),
        r.firmware_status || r.firmware_upload_notes || '',
        r.error_message || ''
      ]));
      if (!table) {
        table = new $.fn.dataTable.Api($('#devicesTable').DataTable({
          data: rows,
          columns: [
            { title: 'Status' },
            { title: 'IP' },
            { title: 'Product' },
            { title: 'MAC' },
            { title: 'Firmware' },
            { title: 'Notes' },
            { title: 'Error' }
          ],
          pageLength: 10
        }));
      } else {
        table.clear();
        table.rows.add(rows);
        table.draw(false);
      }
    }

    async function fetchDevices() {
      const res = await fetch('/api/devices');
      const data = await res.json();
      render(data.results || []);
      return data.running;
    }

    async function runQuery() {
      try {
        const btn = document.getElementById('runBtn');
        btn.disabled = true;
        await fetch('/api/run');
        let running = true;
        while (running) {
          running = await fetchDevices();
          await new Promise(r => setTimeout(r, 1500));
        }
      } catch (e) {
        console.error(e);
      } finally {
        document.getElementById('runBtn').disabled = false;
      }
    }

    document.getElementById('runBtn').addEventListener('click', runQuery);
    fetchDevices();

    // Vertical menu collapse/open with animation + persistence
    (function(){
      var btn = document.querySelector('.navbar-vertical-toggle');
      if (btn) {
        btn.addEventListener('click', function(){
          var html = document.documentElement;
          var collapsed = html.classList.toggle('navbar-vertical-collapsed');
          localStorage.setItem('isNavbarVerticalCollapsed', collapsed);
        });
      }
    })();
  </script>
